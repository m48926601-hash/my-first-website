{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدرب | نادي Haarlem</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("{% static 'images/coach6.PNG' %}");
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .login-panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
        }

        .login-panel h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background-color: #fafafa;
        }

        .form-control:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
        }

        .btn-submit {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1a252f;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-panel">
        <h2>🔐 تسجيل دخول الكابتن</h2>

        <form method="POST" action="">
            {% csrf_token %}
            <div class="form-group">
                <label>اسم المستخدم :</label>
                <input type="text" class="form-control" name="username" required placeholder="أدخل اسم حسابك...">
            </div>

            <div class="form-group">
                <label>كلمة المرور:</label>
                <input type="password" class="form-control" name="password" required placeholder="أدخل كلمة المرور...">
            </div>

            <button type="submit" class="btn-submit">تسجيل الدخول</button>
        </form>

        <a href="/" class="back-link">⬅ العودة للرئيسية</a>
    </div>

</body>

</html>
