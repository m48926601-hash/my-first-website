{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إضافة برنامج تدريبي | نادي Haarlem</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            align-items: center;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
        }

        .sidebar-header {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #3498db;
            width: 100%;
        }

        .coach-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #3498db;
            object-fit: cover;
            margin-bottom: 30px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .sidebar-menu a {
            color: white;
            text-decoration: none;
            padding: 12px 10px;
            border-radius: 5px;
            transition: 0.3s;
            display: block;
            text-align: right;
            font-size: 16px;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: #3498db;
        }

        .logout-btn {
            margin-top: auto;
            background-color: #c0392b;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            display: block;
            width: 100%;
            font-weight: bold;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            margin-right: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .form-panel {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }

        .form-panel h2 {
            margin: 0 0 30px 0;
            font-size: 26px;
            color: #2c3e50;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #3498db;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background-color: #fafafa;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
        }

        .btn-submit {
            background-color: #3498db;
            color: white;
            padding: 12px 35px;
            border: none;
            border-radius: 5px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">نادي ..... الرياضي 💪</div>
        <img src="{% static 'images/coach3.PNG' %}" alt="الكابتن" class="coach-img">
        <div class="sidebar-menu">
            <a href="/coach/">🏠 الرئيسية</a>
            <a href="/coach/trainees/">👥 المتدربون</a>
            <a href="/coach/training/" class="active">📅 البرامج التدريبية</a>
            <a href="/coach/diet/">🍎 البرامج الغذائية</a>
        </div>
        <a href="/coach/logout/" class="logout-btn">خروج 🔙</a>
    </div>

    <div class="main-content">
        <div class="form-panel">
            <h2>📅 إدارة البرامج التدريبية والتمارين</h2>

            {% if error %}
            <div
                style="background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 25px; text-align: center; border: 1px solid #f5c6cb; font-weight: bold;">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>اختر المتدرب (صاحب البرنامج):</label>
                    <select name="trainee_id" class="form-control" required>
                        <option value="" disabled selected>-- اضغط هنا لاختيار المتدرب --</option>
                        {% for trainee in all_trainees %}
                        <option value="{{ trainee.id }}">{{ trainee.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>اسم البرنامج التدريبي:</label>
                    <input type="text" name="title" class="form-control" required
                        placeholder="مثال: تضخيم عضلات، تنشيف، كورس لياقة...">
                </div>

                <div class="form-group">
                    <label>تفاصيل التمارين والجدول الأسبوعي:</label>
                    <textarea name="exercises_details" class="form-control" rows="6" required
                        placeholder="اكتب تفاصيل التمارين، الجولات، والتكرارات هنا..."></textarea>
                </div>

                <button type="submit" class="btn-submit">💾 حفظ البرنامج التدريبي</button>
            </form>
        </div>
    </div>
</body>

</html>
