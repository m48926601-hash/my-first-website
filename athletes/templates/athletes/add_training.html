{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>إدارة البرامج التدريبية | نادي Haarlem الرياضي</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية الثابتة */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            align-items: center;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
        }

        .sidebar-header {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #3498db;
            width: 100%;
        }

        .coach-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #3498db;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .sidebar-menu a {
            color: white;
            text-decoration: none;
            padding: 12px 10px;
            border-radius: 5px;
            transition: 0.3s;
            display: block;
            text-align: right;
            font-size: 16px;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: #3498db;
        }

        .logout-btn {
            margin-top: auto;
            background-color: #c0392b;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            display: block;
            width: 100%;
            font-weight: bold;
        }

        /* المحتوى الرئيسي المتمركز */
        .main-content {
            flex-grow: 1;
            padding: 40px 30px;
            overflow-y: auto;
            margin-right: 250px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* لوحة الفورم الموسطة */
        .form-panel {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }

        .form-panel h2 {
            margin: 0 0 30px 0;
            font-size: 26px;
            color: #2c3e50;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #3498db;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            background-color: #fafafa;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
        }

        .button-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-submit {
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">نادي ....... الرياضي 💪</div>
        <img src="{% static 'images/coach.jpg' %}" alt="الكابتن" class="coach-img">
        <div class="sidebar-menu">
            <a href="/coach/">🏠 الرئيسية</a>
            <a href="/coach/trainees/">👥 المتدربون</a>
            <a href="/coach/training/" class="active">📅 البرامج التدريبية</a>
            <a href="/coach/diet/">🍎 البرامج الغذائية</a>
        </div>
        <a href="/coach/logout/" class="logout-btn">خروج 🔙</a>
    </div>

    <div class="main-content">
        <div class="form-panel">
            <h2>📅 إدارة البرامج التدريبية والتمارين</h2>

            <form method="POST" action="">
                {% csrf_token %}
                <div class="form-group">
                    <label>اسم البرنامج التدريبي:</label>
                    <input type="text" class="form-control" name="program_name"
                        placeholder="مثال: تضخيم عضلات، تخسيس وحرق دهون...">
                </div>
                <div class="form-group">
                    <label>تفاصيل التمارين والجدول الأسبوعي:</label>
                    <textarea class="form-control" name="program_details" rows="6"
                        placeholder="اكتب تفاصيل التمارين، الجولات، والتكرارات هنا..."></textarea>
                </div>
                <div class="button-container">
                    <button type="submit" class="btn-submit">💾 حفظ البرنامج التدريبي</button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
